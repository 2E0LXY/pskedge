name: Build

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Debian-compatible Ubuntu
            os: ubuntu-latest
            artifact: pskedge-deb
            configure: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
            build: cmake --build build --config Release --parallel
            package: cmake --build build --target package --config Release
            artifact_path: build/*.deb
          - name: Windows
            os: windows-2022
            artifact: pskedge-windows
            configure: cmake -S . -B build -G "Visual Studio 17 2022" -A x64
            build: cmake --build build --config Release --parallel
            package: cmake --install build --config Release --prefix package && windeployqt package/bin/pskedge.exe
            artifact_path: package/**

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.3"
          modules: qtmultimedia
          cache: true

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake dpkg-dev fakeroot ninja-build qt6-base-dev qt6-multimedia-dev

      - name: Configure
        shell: bash
        run: ${{ matrix.configure }}

      - name: Build
        shell: bash
        run: ${{ matrix.build }}

      - name: Test
        shell: bash
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Package
        shell: bash
        run: ${{ matrix.package }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
