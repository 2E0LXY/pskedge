name: Build

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Debian-compatible Ubuntu
            os: ubuntu-latest
            artifact: psk-analyzer-linux
            configure: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
            build: cmake --build build --config Release --parallel
            artifact_path: build/psk-analyzer
          - name: Windows
            os: windows-2022
            artifact: psk-analyzer-windows
            configure: cmake -S . -B build -G "Visual Studio 17 2022" -A x64
            build: cmake --build build --config Release --parallel
            artifact_path: build/Release/psk-analyzer.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.3"
          cache: true

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build

      - name: Configure
        shell: bash
        run: ${{ matrix.configure }}

      - name: Build
        shell: bash
        run: ${{ matrix.build }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
